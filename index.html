<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invitación Digital Premium</title>
    <link rel="preconnect" href="https://fonts.googleapis.com/">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel&family=Cormorant+Garamond&family=Jost&display=swap" rel="stylesheet">
    <style>
        :root { --bg-1: #F5F0E4; --bg-2: #DDD5B0; --accent: #C9A227; --title-color: #5A4A0F; --text-color: #4A3C1E; --title-font: 'Cinzel', serif; --body-font: 'Cormorant Garamond', serif; }
        body { background-color: var(--bg-1); color: var(--text-color); font-family: var(--body-font); text-align: center; margin: 0; }
        #cover { position: relative; height: 100vh; display: flex; align-items: center; justify-content: center; }
        #cover-bg { position: absolute; inset: 0; background-size: cover; background-position: center; }
        section { padding: 4rem 1.5rem; opacity: 0; transform: translateY(20px); transition: 0.8s; }
        section.visible { opacity: 1; transform: translateY(0); }
        .gallery-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 2rem; }
        .gallery-item { aspect-ratio: 1/1; overflow: hidden; border-radius: 10px; cursor: pointer; }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; }
        .btn { display: inline-block; padding: 1rem 2rem; margin-top: 20px; background: var(--accent); color: white; text-decoration: none; border-radius: 50px; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 9999; }
    </style>
</head>
<body>

    <div id="cover">
        <div id="cover-bg" style="background-image: url('cover.jpg');"></div>
        <div id="cover-content"><h1>Mi Primer Añito</h1></div>
    </div>

    <div id="main-content"></div>

    <div id="lightbox" class="modal" onclick="this.style.display='none'">
        <img id="lb-img" style="max-width:90%; max-height:80%;">
    </div>

<script>
/* CONFIGURACIÓN FÁCIL */
const CONFIG = {
    textos: { tituloHistoria: "¡Se Acerca Mi Primer Cumple!", historia: "Deseo que me acompañes a celebrar este día tan especial." },
    fotos: ["foto1.jpg", "foto2.jpg", "foto3.jpg", "foto4.jpg", "foto5.jpg", "foto6.jpg"]
};

/* LÓGICA DE CONSTRUCCIÓN (SIN DUPLICADOS) */
const main = document.getElementById('main-content');

function createSec(title, content) {
    const s = document.createElement('section');
    s.innerHTML = `<div class="sec-inner"><h2>${title}</h2>${content}</div>`;
    main.appendChild(s);
}

// Generar secciones una sola vez
createSec(CONFIG.textos.tituloHistoria, `<p>${CONFIG.textos.historia}</p>`);

let galeriaHTML = `<div class="gallery-grid">`;
CONFIG.fotos.forEach(f => {
    galeriaHTML += `<div class="gallery-item" onclick="openLightbox('${f}')"><img src="${f}" onerror="this.style.display='none'"></div>`;
});
galeriaHTML += `</div>`;
createSec("Mis recuerdos", galeriaHTML);

createSec("Confirmación", `<p>Por favor, confirma tu asistencia.</p><a href="https://wa.me/59899000000" class="btn">WhatsApp</a>`);

// Funciones
function openLightbox(src) {
    document.getElementById('lb-img').src = src;
    document.getElementById('lightbox').style.display = 'flex';
}

const obs = new IntersectionObserver(e => e.forEach(i => { if(i.isIntersecting) i.target.classList.add('visible')}));
document.querySelectorAll('section').forEach(s => obs.observe(s));
</script>
</body>
</html>
