<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invitación Digital Premium</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link id="font-link" href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Allura&family=Cinzel:wght@300;400;500&family=Cormorant+Garamond:wght@300;400&family=Great+Vibes&family=Jost:wght@300;400&family=Montserrat:wght@300;400;500&family=Nunito:wght@300;400&family=Parisienne&family=Playfair+Display:wght@300;400;500&family=Poppins:wght@300;400;500&family=Quicksand:wght@300;400;500&family=Raleway:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root {
  --bg-1: #FFFFFF;
  --bg-2: #EBDEDE;
  --accent: #D4A5A5;
  --title-color: #B5104E;
  --text-color: #8A7575;
  --title-font: 'Cormorant Garamond', serif;
  --body-font: 'Jost', sans-serif;
  --title-size: 3rem;
  --body-size: 1.5rem;
  --espacio-titulo-texto: 3rem;
  --espacio-texto-boton: 1.5rem;
  --pos-pc-vertical: 50%;
  --pos-movil-vertical: 50%;
  --cover-content-width: 900px;
  --cover-content-x: 0px;
  --cover-content-y: 130px;
  --cover-content-x-mobile: 0px;
  --cover-content-y-mobile: 130px;
  --cover-text-align: center;
  --cover-fit: contain;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg-1);
  color: var(--text-color);
  font-family: var(--body-font);
  line-height: 1.6;
  text-align: center;
}

#cover {
  position: relative;
  min-height: 100svh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  color: #FFFFFF;
}

#cover-bg,
#cover-video {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
}

#cover-bg {
  background-size: var(--cover-fit);
  background-repeat: no-repeat;
  background-position: center;
}

#cover-video {
  object-fit: var(--cover-fit);
  display: none;
}

@media (min-width: 768px) {
  #cover-bg { background-position: center var(--pos-pc-vertical) !important; }
}

@media (max-width: 767px) {
  #cover-bg { background-position: center var(--pos-movil-vertical) !important; }
}

#cover-overlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.0);
}

#cover-content {
  position: relative;
  z-index: 2;
  width: min(90vw, var(--cover-content-width));
  padding: 20px;
  text-align: var(--cover-text-align);
  transform: translate(var(--cover-content-x), var(--cover-content-y));
}

#t-eyebrow,
#t-names,
#t-cover-date {
  display: block;
  margin-left: auto;
  margin-right: auto;
  overflow-wrap: anywhere;
}

#cover h1 { margin: 0; }

.cover-actions {
  position: absolute;
  z-index: 12;
  left: 50%;
  bottom: 76px;
  display: flex;
  gap: 16px;
  align-items: center;
  justify-content: center;
  transform: translateX(-50%);
}

.cover-action-btn {
  width: 104px;
  height: 104px;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.62);
  background: rgba(255,255,255,0.86);
  color: #1b1b1b;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 14px;
  font-family: var(--body-font);
  font-size: 0.66rem;
  font-weight: 700;
  letter-spacing: 1.6px;
  line-height: 1.25;
  text-transform: uppercase;
  text-decoration: none;
  cursor: pointer;
  box-shadow: 0 12px 30px rgba(0,0,0,0.18), inset 0 1px 0 rgba(255,255,255,0.7);
  backdrop-filter: blur(8px);
  transition: transform 0.25s ease, background 0.25s ease, color 0.25s ease;
  box-shadow:
  0 0 0 8px rgba(255,255,255,0.15),
  0 0 25px rgba(255,255,255,0.45),
  0 12px 30px rgba(0,0,0,0.25),
  inset 0 1px 0 rgba(255,255,255,0.7);

animation: pulseButton 2.5s infinite;
}

.cover-action-btn:hover,
.btn:hover {
  transform: translateY(-3px);
}

.cover-action-btn.is-playing {
  background: var(--accent);
  color: #1b1b1b;
}

.music-symbol {
  width: 28px;
  height: 28px;
}

.scroll-arrow {
  position: absolute;
  bottom: 26px;
  left: 50%;
  width: 30px;
  height: 30px;
  color: #FFFFFF;
  z-index: 10;
  animation: bounce 2s infinite;
}

@keyframes bounce {
  0%, 100% { transform: translate(-50%, 0); opacity: 0.35; }
  50% { transform: translate(-50%, 12px); opacity: 1; }
}
  @keyframes pulseButton {
  0% {
    transform: scale(1);
    box-shadow:
      0 0 0 0 rgba(255,255,255,0.45),
      0 12px 30px rgba(0,0,0,0.25);
  }

  70% {
    transform: scale(1.06);
    box-shadow:
      0 0 0 18px rgba(255,255,255,0),
      0 12px 30px rgba(0,0,0,0.25);
  }

  100% {
    transform: scale(1);
    box-shadow:
      0 0 0 0 rgba(255,255,255,0),
      0 12px 30px rgba(0,0,0,0.25);
  }
}

@media (max-width: 767px) {
  #cover-content {
    transform: translate(var(--cover-content-x-mobile), var(--cover-content-y-mobile));
  }

  .cover-actions {
    bottom: 68px;
    gap: 12px;
  }

  .cover-action-btn {
    width: 88px;
    height: 88px;
    font-size: 0.57rem;
    letter-spacing: 1px;
  }
}

section {
  position: relative;
  overflow: hidden;
  min-height: auto;
  padding: clamp(4.5rem, 9vw, 7rem) 1.35rem;
  display: flex;
  align-items: center;
  opacity: 0;
  transform: translateY(20px);
  transition: 1s all ease;
}

section.visible {
  opacity: 1;
  transform: translateY(0);
}

section:nth-of-type(odd) { background-color: var(--bg-1) !important; }
section:nth-of-type(even) { background-color: var(--bg-2) !important; }

.section-inner {
  position: relative;
  z-index: 1;
  width: min(920px, 100%);
  margin: 0 auto;
}

.icon-container {
  width: 45px;
  margin: 0 auto var(--espacio-titulo-texto);
  color: #49614C;
  animation: floating 3s ease-in-out infinite;
}

@keyframes floating {
  0% { transform: translateY(0px); }
  50% { transform: translateY(-12px); }
  100% { transform: translateY(0px); }
}

h2 {
  font-family: var(--title-font);
  font-size: var(--title-size);
  font-weight: 300;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--title-color);
  margin-bottom: var(--espacio-titulo-texto);
}

p {
  font-size: var(--body-size);
  overflow-wrap: anywhere;
}

h3 {
  position: relative;
  font-family: var(--title-font);
  font-size: 1.5rem;
  font-weight: 300;
  letter-spacing: 3px;
  color: var(--title-color);
  text-transform: uppercase;
  margin-bottom: 0.8rem;
}

h3::after {
  content: "";
  display: block;
  width: 40px;
  height: 1px;
  background: var(--accent);
  margin: 10px auto 0;
  opacity: 0.6;
}

.section-copy {
  max-width: 760px;
  margin: 0 auto;
}

.section-floor {
  width: min(680px, 100%);
  margin: var(--espacio-texto-boton) auto 0;
  display: grid;
  grid-template-columns: minmax(96px, 148px) minmax(130px, 1fr);
  gap: clamp(18px, 5vw, 38px);
  align-items: end;
  justify-content: center;
}

.section-floor.no-action {
  grid-template-columns: 1fr;
  justify-items: center;
}

.section-floor.has-action {
  grid-template-columns: auto 1fr;
  align-items: center;
}
.section-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 14px;
  align-items: center;
  justify-content: center;
}

.event-block + .event-block {
  margin-top: 2.6rem;
}

.btn,
button.btn,
a.btn {
  width: 118px;
  height: 118px;
  min-width: 118px;
  border-radius: 50%;
  border: none;
  background: var(--accent);
  color: #1b1b1b !important;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 16px;
  font-family: var(--body-font) !important;
  font-size: 0.66rem !important;
  font-weight: 700;
  line-height: 1.22;
  letter-spacing: 1.6px;
  text-align: center;
  text-transform: uppercase;
  text-decoration: none;
  cursor: pointer;
  box-shadow: 0 10px 22px rgba(0,0,0,0.13), inset 0 1px 0 rgba(255,255,255,0.35);
  transition: transform 0.25s ease, box-shadow 0.25s ease;
}

.section-image-wrap {
  width: var(--section-img-size, 240px);
  max-width: min(46vw, 320px);
  justify-self: center;
  transform: translate(var(--section-img-x, 0px), var(--section-img-y, 0px));
  opacity: var(--section-img-opacity, 1);
  pointer-events: none;
}

.section-image-wrap img {
  display: block;
  width: 100%;
  height: auto;
  object-fit: contain;
  filter: drop-shadow(0 16px 28px rgba(0,0,0,0.12));
}

.countdown-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  max-width: 430px;
  margin: 2rem auto 0;
}

.cd-item {
  background: rgba(255,255,255,0.72);
  padding: 15px 5px;
  border-radius: 8px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.05);
}

.cd-num {
  display: block;
  font-family: var(--title-font);
  font-size: 1.6rem;
  color: var(--title-color);
  font-weight: bold;
}

.cd-lab {
  font-size: 0.6rem;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: #1B1B1B;
}

.gallery-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
  margin-top: 2rem;
}

.gallery-item {
  aspect-ratio: 1/1;
  overflow: hidden;
  border-radius: 8px;
  cursor: pointer;
}

.gallery-item img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: 0.4s;
}

.gallery-item:hover img {
  transform: scale(1.04);
}

.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(10px);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 4000;
  padding: 20px;
}

.modal-content {
  position: relative;
  width: 100%;
  max-width: 380px;
  padding: 2.5rem 1.5rem;
  color: #FFFFFF;
  background: rgba(255, 255, 255, 0.25);
  border: 1px solid rgba(255,255,255,0.3);
  border-radius: 8px;
}

.close-btn {
  position: absolute;
  top: 15px;
  right: 18px;
  width: 38px;
  height: 38px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.8rem;
  color: #FFFFFF;
  cursor: pointer;
}

#toast {
  position: fixed;
  bottom: 100px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.85);
  color: #FFFFFF;
  padding: 10px 25px;
  border-radius: 999px;
  font-size: 0.8rem;
  z-index: 7000;
  display: none;
}

#lightbox {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.9);
  z-index: 6000;
  display: none;
  align-items: center;
  justify-content: center;
}

#lightbox img {
  max-width: 90%;
  max-height: 80%;
  border-radius: 8px;
}

.ornamento {
  position: absolute;
  width: 220px;
  height: 220px;
  background-size: contain;
  background-repeat: no-repeat;
  opacity: 0.08;
  pointer-events: none;
  z-index: 0;
  animation: floatOrnamento 8s ease-in-out infinite;
}

.ornamento svg {
  display: block;
  width: 100%;
  height: 100%;
}

.orn-top-left { top: -40px; left: -40px; }
.orn-top-right { top: -40px; right: -40px; }
.orn-bottom-left { bottom: -50px; left: -50px; }
.orn-bottom-right { bottom: -50px; right: -50px; }

@keyframes floatOrnamento {
  0% { transform: translateY(0px) rotate(0deg); }
  50% { transform: translateY(-10px) rotate(2deg); }
  100% { transform: translateY(0px) rotate(0deg); }
}

@media (min-width: 768px) {
  .gallery-grid { grid-template-columns: repeat(4, 1fr); }
}

@media (max-width: 640px) {
  section {
    min-height: auto;
    padding: 4.25rem 1rem;
  }

  .section-floor {
  width: 100%;
  grid-template-columns: auto auto;
  justify-content: center;
  align-items: center;
  gap: 8px;
}

.section-floor.no-action {
  grid-template-columns: 1fr;
  justify-items: center;
}

 .section-floor.has-action .section-image-wrap {
  order: 1;
}

.section-floor.has-action .section-image-wrap {
  order: 1;
}

.section-floor.has-action {
  transform: translateX(-15px);
}

.section-actions {
  order: 2;
}

 .section-image-wrap {
  width: var(--section-img-size-mobile, min(230px, 70vw));
  max-width: 40vw;
}

  .btn,
  button.btn,
  a.btn {
    width: 104px;
    height: 104px;
    min-width: 104px;
    font-size: 0.58rem !important;
    letter-spacing: 1.1px;
  }

  .countdown-grid {
    grid-template-columns: repeat(2, 1fr);
    max-width: 310px;
  }
}
</style>
</head>
<body>

<div id="toast">Cuenta copiada</div>

<audio id="bg-music" src="musica.mp3" loop></audio>

<div id="cover">
  <div id="cover-bg"></div>
  <video id="cover-video" autoplay muted loop playsinline>
    <source src="" type="video/mp4">
  </video>
  <div id="cover-overlay"></div>

  <div id="cover-content">
    <span id="t-eyebrow"></span>
    <h1 id="t-names"></h1>
    <p id="t-cover-date"></p>
  </div>

  <div class="cover-actions" id="cover-actions">
    <button class="cover-action-btn" id="cover-music-btn" type="button" onclick="toggleMusic()" aria-label="Activar música">
      <svg class="music-symbol" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M9 18V5l12-2v13"></path>
        <circle cx="6" cy="18" r="3"></circle>
        <circle cx="18" cy="16" r="3"></circle>
      </svg>
    </button>
    <button class="cover-action-btn" id="cover-invite-btn" type="button" onclick="verInvitacion()">Ver invitación</button>
  </div>

  <div class="scroll-arrow" id="scroll-arrow">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M7 13l5 5 5-5M7 6l5 5 5-5"/>
    </svg>
  </div>
</div>

<div id="main-content"></div>

<div id="gift-modal" class="modal" onclick="closeGiftModal()">
  <div class="modal-content" onclick="event.stopPropagation()">
    <span class="close-btn" onclick="closeGiftModal()">&times;</span>
    <p id="m-texto" style="font-size: 1.5rem; margin-bottom: 10px; opacity: 0.9;"></p>
    <div style="background: rgba(0,0,0,0.25); border-radius: 8px; padding: 1rem; margin: 1.5rem 0; text-align: left;">
      <div style="padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.1);"><span style="font-size: 0.6rem; text-transform: uppercase; opacity: 0.7;">Titular</span><span style="font-size: 1rem; display: block; font-weight: 300;" id="m-titular"></span></div>
      <div style="padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.1);"><span style="font-size: 0.6rem; text-transform: uppercase; opacity: 0.7;">Banco</span><span style="font-size: 1rem; display: block; font-weight: 300;" id="m-banco"></span></div>
      <div style="padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.1);"><span style="font-size: 0.6rem; text-transform: uppercase; opacity: 0.7;">Número</span><span style="font-size: 1rem; display: block; font-weight: 300;" id="m-cuenta"></span></div>
      <div style="padding: 8px 0;"><span style="font-size: 0.6rem; text-transform: uppercase; opacity: 0.7;">CI</span><span style="font-size: 1rem; display: block; font-weight: 300;" id="m-ci"></span></div>
    </div>
    <button class="btn" onclick="copyAcc()">Copiar cuenta</button>
  </div>
</div>

<div id="lightbox" onclick="closeLightbox()">
  <span class="close-btn" style="position:fixed; top:30px; right:30px; font-size:3rem;">&times;</span>
  <img src="" alt="" onclick="event.stopPropagation()">
</div>

<script>
/* ==========================================================================
   CONFIGURACIÓN FÁCIL
   Todos los archivos quedan sueltos junto al index.html:
   cover.jpg, portada.mp4, musica.mp3, imagen1.png, imagen2.png, foto1.jpg...
========================================================================== */
const CONFIG = {
  global: {
    nombres: "",
    frase: "",
    fecha: "",
    fechaCuenta: new Date(2026, 11, 20, 17, 0),

    /* Elegir portada: "foto", "video" o "diseno" */
    tipoPortada: "foto",
    fotoPort: "cover.png",
    videoPort: "portada.mp4",
    disenoPort: "floral.jpg",
    ajustePortada: "contain", // "contain" muestra todo; "cover" llena la pantalla y puede recortar

    posicionVerticalPC: 35,
    posicionVerticalMovil: 50,

    mostrarBotonMusicaPortada: true,
    mostrarBotonVerInvitacion: true,
    mostrarFlechitaScroll: true
  },

  portada: {
    frase: {
      mostrar: false,
      texto: "Mi Primer Añito",
      fuente: 2,
      color: "#3E8C45",
      tamaño: "3rem",
      tamañoMovil: "1.35rem",
      grosor: 300,
      espaciadoLetras: "5px",
      interlineado: "1.2",
      mayusculas: true,
      margenAbajo: "10rem",
      moverDerechaIzquierda: 0,
      moverArribaAbajo: 0,
      sombra: "0 2px 12px rgba(0,0,0,0.25)"
    },
    nombre: {
      mostrar: false,
      texto: "Lucas",
      fuente: 12,
      color: "#327D39",
      tamaño: "clamp(4rem, 9vw, 6rem)",
      tamañoMovil: "4rem",
      grosor: 300,
      espaciadoLetras: "2px",
      interlineado: "1",
      mayusculas: false,
      margenAbajo: "9rem",
      moverDerechaIzquierda: 0,
      moverArribaAbajo: 0,
      sombra: "0 3px 18px rgba(255,255,255,0.18)"
    },
    fecha: {
      mostrar: false,
      texto: "",
      fuente: 12,
      color: "#FFFFFF",
      tamaño: "1.3rem",
      tamañoMovil: "1rem",
      grosor: 300,
      espaciadoLetras: "3px",
      interlineado: "1.3",
      mayusculas: true,
      margenArriba: "0.2rem",
      moverDerechaIzquierda: 0,
      moverArribaAbajo: 0,
      sombra: "0 2px 12px rgba(0,0,0,0.25)"
    },
    cajaTexto: {
      anchoMaximo: "900px",
      alineacion: "center",
      moverDerechaIzquierdaPC: 0,
      moverArribaAbajoPC: 130,
      moverDerechaIzquierdaMovil: 0,
      moverArribaAbajoMovil: 130
    },
    fondo: {
      oscurecer: "rgba(0,0,0,0.0)"
    }
  },

  diseno: {
    paleta: 5,
    fuenteTitulo: 12,
    fuenteTexto: 1,
    tamañoTitulo: "1.8rem",
    tamañoTexto: "1.2rem",
    espacioTituloATexto: 30,
    espacioTextoABoton: 40
  },

  /*
    Imágenes PNG de cada sección.
    tamaño = tamaño en computadora
    tamañoMovil = tamaño en celular
    intensidad = opacidad de 0 a 1
    moverDerechaIzquierda = negativo mueve a la izquierda, positivo a la derecha
    moverArribaAbajo = negativo sube, positivo baja
  */
  imagenesSecciones: {
    mostrar: true,
    historia: { mostrar: true, archivo: "imagen1.png", tamaño: 320, tamañoMovil: 210, intensidad: 1, moverDerechaIzquierda: 0, moverArribaAbajo: 0 },
    cuenta: { mostrar: true, archivo: "imagen2.png", tamaño: 320, tamañoMovil: 200, intensidad: 1, moverDerechaIzquierda: 0, moverArribaAbajo: 0 },
    ubicacion: { mostrar: true, archivo: "imagen3.png", tamaño: 235, tamañoMovil: 210, intensidad: 1, moverDerechaIzquierda: 20, moverArribaAbajo: -30 },
    rsvp: { mostrar: true, archivo: "imagen4.png", tamaño: 225, tamañoMovil: 205, intensidad: 1, moverDerechaIzquierda: 10, moverArribaAbajo: 0 },
    playlist: { mostrar: true, archivo: "imagen5.png", tamaño: 225, tamañoMovil: 205, intensidad: 1, moverDerechaIzquierda: 0, moverArribaAbajo: 0 },
    regalos: { mostrar: true, archivo: "imagen6.png", tamaño: 225, tamañoMovil: 205, intensidad: 1, moverDerechaIzquierda: 0, moverArribaAbajo: 0 },
    extra: { mostrar: true, archivo: "imagen7.png", tamaño: 225, tamañoMovil: 205, intensidad: 1, moverDerechaIzquierda: 0, moverArribaAbajo: 0 },
    cierre: { mostrar: true, archivo: "imagen8.png", tamaño: 280, tamañoMovil: 190, intensidad: 1, moverDerechaIzquierda: 0, moverArribaAbajo: 0 }
  },

function valorCSS(valor, unidad = "px") {
  if (valor === undefined || valor === null || valor === "") return "";
  return typeof valor === "number" ? valor + unidad : valor;
}

function aplicarEstiloTextoPortada(elemento, configTexto, textoRespaldo, permiteAmpersand = false) {
  if (!elemento || !configTexto || configTexto.mostrar === false) {
    if (elemento) elemento.style.display = "none";
    return;
  }

  const esMovil = window.matchMedia("(max-width: 767px)").matches;
  const texto = configTexto.texto !== undefined ? configTexto.texto : textoRespaldo;

  elemento.style.display = "block";
  elemento.style.fontFamily = FUENTES[configTexto.fuente] || configTexto.fuente || FUENTES[CONFIG.diseno.fuenteTitulo];
  elemento.style.color = configTexto.color || "#FFFFFF";
  elemento.style.fontSize = esMovil && configTexto.tamañoMovil ? configTexto.tamañoMovil : configTexto.tamaño;
  elemento.style.fontWeight = configTexto.grosor || 300;
  elemento.style.letterSpacing = valorCSS(configTexto.espaciadoLetras);
  elemento.style.lineHeight = configTexto.interlineado || "1";
  elemento.style.textTransform = configTexto.mayusculas ? "uppercase" : "none";
  elemento.style.marginTop = valorCSS(configTexto.margenArriba || 0);
  elemento.style.marginBottom = valorCSS(configTexto.margenAbajo || 0);
  elemento.style.textShadow = configTexto.sombra || "none";
  elemento.style.transform = `translate(${valorCSS(configTexto.moverDerechaIzquierda || 0)}, ${valorCSS(configTexto.moverArribaAbajo || 0)})`;

  if (permiteAmpersand) {
    elemento.innerHTML = String(texto || "").replace(/&/g, "<em>&</em>");
  } else {
    elemento.innerText = texto || "";
  }
}

  root.style.setProperty('--cover-content-x', valorCSS(cajaTexto.moverDerechaIzquierdaPC || 0));
  root.style.setProperty('--cover-content-y', valorCSS(cajaTexto.moverArribaAbajoPC || 0));
  root.style.setProperty('--cover-content-x-mobile', valorCSS(cajaTexto.moverDerechaIzquierdaMovil || 0));
  root.style.setProperty('--cover-content-y-mobile', valorCSS(cajaTexto.moverArribaAbajoMovil || 0));
  root.style.setProperty('--cover-text-align', cajaTexto.alineacion || 'center');

  const overlay = document.getElementById('cover-overlay');

}

function crearBoton(texto, enlace, extra = "") {

function getImagenConfig(id) {
  const grupo = CONFIG.imagenesSecciones || {};
  if (!grupo.mostrar) return null;
  const img = grupo[id];
  if (!img || img.mostrar === false || !img.archivo) return null;
  return img;
}

function imagenSeccionHTML(id) {
  const img = getImagenConfig(id);
  if (!img) return "";
  const estilos = [
    `--section-img-size:${valorCSS(img.tamaño || 230)}`,
    `--section-img-size-mobile:${valorCSS(img.tamañoMovil || img.tamaño || 210)}`,
    `--section-img-opacity:${img.intensidad ?? 1}`,
    `--section-img-x:${valorCSS(img.moverDerechaIzquierda || 0)}`,
    `--section-img-y:${valorCSS(img.moverArribaAbajo || 0)}`
  ].join(';');

  return `<div class="section-image-wrap" style="${estilos}"><img src="${img.archivo}" alt=""></div>`;
}

function createSec(id, icon, title, copyHTML, actionHTML = "") {

  const hasAction = Boolean(actionHTML);
  let floorHTML = "";

if (imageHTML && hasAction) {
  floorHTML = `<div class="section-floor has-action">
    ${imageHTML}
    <div class="section-actions">${actionHTML}</div>
  </div>`;
}

else if (imageHTML && !hasAction) {
  floorHTML = `<div class="section-floor no-action">
    ${imageHTML}
  </div>`;
}

else if (!imageHTML && hasAction) {
  floorHTML = `<div class="section-floor no-action">
    <div class="section-actions">${actionHTML}</div>
  </div>`;
}

  s.innerHTML = `
    <div class="section-inner">
      <div class="icon-container">${iconSet[icon] || iconSet.heart}</div>
      <h2>${title}</h2>
      <div class="section-copy">${copyHTML}</div>
      ${floorHTML}
    </div>`;
  main.appendChild(s);
}

function crearOrnamento(config, posicion, colorBase) {
  const ornamento = document.createElement('div');
  ornamento.className = `ornamento orn-${posicion}`;
  ornamento.style.width = valorCSS(config.tamaño || 220);
  ornamento.style.height = valorCSS(config.tamaño || 220);
  ornamento.style.opacity = config.opacidad ?? 0.08;
  ornamento.style.color = config.color || colorBase || colores.boton;
  ornamento.innerHTML = ORNAMENTOS[config.tipo] || ORNAMENTOS.floral;
  return ornamento;
}

function aplicarOrnamentos() {
  const config = CONFIG.ornamentos || {};
  const secciones = config.secciones || {};
  const portada = config.portada || {};
  const colorBase = colores.boton;

  if (portada.mostrar) {
    const cover = document.getElementById('cover');
    (portada.posiciones || ["top-left", "top-right"]).forEach(posicion => {
      cover.appendChild(crearOrnamento(portada, posicion, colorBase));
    });
  }

  if (!secciones.mostrar) return;
  const excluidas = secciones.excluirSecciones || [];

  document.querySelectorAll('section').forEach(section => {
    if (excluidas.includes(section.id)) return;
    (secciones.posiciones || ["top-left", "bottom-right"]).forEach(posicion => {
      section.appendChild(crearOrnamento(secciones, posicion, colorBase));
    });
  });
}

function openGiftModal() {

function copyAcc() {
  navigator.clipboard.writeText(CONFIG.regalos.cuenta);
  const t = document.getElementById('toast');
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 2000);
}

function toggleMusic() {
  const music = document.getElementById('bg-music');
  const btn = document.getElementById('cover-music-btn');

  if (music.paused) {
    music.play();
    btn.classList.add('is-playing');
    btn.setAttribute('aria-label', 'Pausar música');
  } else {
    music.pause();
    btn.classList.remove('is-playing');
    btn.setAttribute('aria-label', 'Activar música');
  }
}

function updateCD() {
  const t = CONFIG.global.fechaCuenta - new Date();
  if (t < 0) return;
  document.getElementById('days').innerText = Math.floor(t / 86400000);
  document.getElementById('hours').innerText = Math.floor((t / 3600000) % 24);
  document.getElementById('mins').innerText = Math.floor((t / 60000) % 60);
  document.getElementById('secs').innerText = Math.floor((t / 1000) % 60);
}

updateCD();
setInterval(updateCD, 1000);

const obs = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if (entry.isIntersecting) entry.target.classList.add('visible');
  });
}, { threshold: 0.1 });

document.querySelectorAll('section').forEach(section => obs.observe(section));
aplicarOrnamentos();
