<style>
/* ── VARIABLES DE DISEÑO ── */
:root {
  --bg-1: #FFFFFF;
  --bg-2: #EBDEDE;
  --accent: #D4A5A5; 
  --title-color: #B5104E;
  --text-color: #8A7575;
  --title-font: 'Cormorant Garamond', serif;
  --body-font: 'Jost', sans-serif;
  --title-size: 3rem;
  --body-size: 1.5rem;
  
  /* Estas variables se llenan automáticamente con el menú CONFIG */
  --espacio-titulo-texto: 3rem;
  --espacio-texto-boton: 1.5rem;
  --pos-pc-vertical: 50%;
  --pos-movil-vertical: 50%;
  --cover-content-width: 900px;
  --cover-content-x: 0px;
  --cover-content-y: 130px;
  --cover-content-x-mobile: 0px;
  --cover-content-y-mobile: 130px;
  --cover-text-align: center;
}

/* ── RESET & BASE ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { 
    background-color: var(--bg-1); color: var(--text-color); 
    font-family: var(--body-font); line-height: 1.6; text-align: center;
}

/* ── PORTADA ── */
#cover {
  position: relative; height: 100vh; display: flex; 
  align-items: center; justify-content: center; overflow: hidden; color: #FFFFFF;
} 
#cover-bg { 
    position: absolute;
    inset: 0;
    background-size: cover;
    background-repeat: no-repeat;
    background-position: center var(--pos-movil-vertical);
}

#cover-video {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: none;
}

/* Ajuste preciso para PC */
@media (min-width: 768px) {
    #cover-bg {
        background-position: center var(--pos-pc-vertical) !important;
    }
}

#cover-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.0); }
#cover-content {
  position: relative;
  z-index: 2;
  width: min(90vw, var(--cover-content-width));
  padding: 20px;
  text-align: var(--cover-text-align);
  transform: translate(var(--cover-content-x), var(--cover-content-y));
}
#t-eyebrow,
#t-names,
#t-cover-date {
  display: block;
  margin-left: auto;
  margin-right: auto;
  overflow-wrap: anywhere;
}
#cover h1 {
  margin: 0;
}

@media (max-width: 767px) {
  #cover-content {
    transform: translate(var(--cover-content-x-mobile), var(--cover-content-y-mobile));
  }
}

/* ── ICONOS FLOTANTES ── */
.icon-container {
    width: 45px; margin: 0 auto; color: var(--accent);
    margin-bottom: var(--espacio-titulo-texto); /* Usa el espaciado configurable */
    animation: floating 3s ease-in-out infinite;
}
@keyframes floating {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-12px); }
    100% { transform: translateY(0px); }
}

/* ── SECCIONES ── */
section { padding: 6rem 1.5rem; opacity: 0; transform: translateY(20px); transition: 1s all ease; }
section.visible { opacity: 1; transform: translateY(0); }
section:nth-of-type(odd) { background-color: var(--bg-1) !important; }
section:nth-of-type(even) { background-color: var(--bg-2) !important; }

h2 { 
    font-family: var(--title-font); font-size: var(--title-size); 
    font-weight: 300; letter-spacing: 2px; text-transform: uppercase;
    color: var(--title-color); 
    margin-bottom: var(--espacio-titulo-texto); /* ESPACIADO TITULO -> TEXTO */
  }
  p {
    font-size: var(--body-size);
  
}
h3 {
    font-family: var(--title-font);
    font-size: 1.5rem;
    font-weight: 300;
    letter-spacing: 3px;
    color: var(--title-color);
    text-transform: uppercase;
    margin-bottom: 0.8rem;

    position: relative;
}

h3::after {
    content: "";
    display: block;
    width: 40px;
    height: 1px;
    background: var(--accent);
    margin: 10px auto 0;
    opacity: 0.6;
}
/* ── BOTONES ── */
.btn,
button.btn,
a.btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;

    padding: 1rem 2.2rem;
    margin-top: var(--espacio-texto-boton);

    background: var(--accent);
    color: #1b1b1b !important;

    font-family: var(--body-font) !important;
    font-size: 0.75rem !important;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 3px;

    border: none;
    border-radius: 50px;
    cursor: pointer;
    text-decoration: none;

    box-shadow:
        0 8px 18px rgba(0,0,0,0.12),
        inset 0 1px 0 rgba(255,255,255,0.35);

    transition: all 0.25s ease;

    /* importante para que no “deforme” el layout */
    width: auto;
}
/* ── OTROS ELEMENTOS ── */
.scroll-arrow {
    position: absolute; bottom: 110px; left: 50%; transform: translateX(-50%);
    width: 30px; height: 30px; color: white; z-index: 10; animation: bounce 2s infinite;
}
@keyframes bounce { 0%, 100% { transform: translate(-50%, 0); opacity: 0.3; } 50% { transform: translate(-50%, 15px); opacity: 1; } }

.countdown-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; max-width: 400px; margin: 2rem auto; }
.cd-item { background: white; padding: 15px 5px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
.cd-num { display: block; font-family: var(--title-font); font-size: 1.6rem; color: var(--accent); font-weight: bold; }
.cd-lab { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 1px;color: #1B1B1B; }

.gallery-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 2rem; }
.gallery-item { aspect-ratio: 1/1; overflow: hidden; border-radius: 15px; cursor: pointer; }
.gallery-item img { width: 100%; height: 100%; object-fit: cover; transition: 0.4s; }

.modal {
    position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(10px);
    display: none; align-items: center; justify-content: center; z-index: 4000; padding: 20px;
}
.modal-content {
    background: rgba(255, 255, 255, 0.25); border: 1px solid rgba(255,255,255,0.3);
    border-radius: 30px; width: 100%; max-width: 380px; padding: 2.5rem 1.5rem; color: white; position: relative;
}
.close-btn { position: absolute; top: 15px; right: 20px; font-size: 1.8rem; color: white; cursor: pointer; }

#toast {
    position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.85); color: white; padding: 10px 25px;
    border-radius: 50px; font-size: 0.8rem; z-index: 7000; display: none;
}

#music-btn {
    position: fixed; bottom: 25px; right: 25px; width: 45px; height: 45px;
    background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1); z-index: 5000; cursor: pointer; color: var(--accent);
}

#lightbox { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 6000; display: none; align-items: center; justify-content: center; }
#lightbox img { max-width: 90%; max-height: 80%; border-radius: 10px; }

@media (min-width: 768px) { 
    .gallery-grid { grid-template-columns: repeat(4, 1fr); } 
}

/* ═════════ ORNAMENTOS DECORATIVOS ═════════ */

section {
    position: relative;
    overflow: hidden;
}

section > div {
    position: relative;
    z-index: 1;

/* capa base */
.ornamento {
    position: absolute;
    width: 220px;
    height: 220px;
    background-size: contain;
    background-repeat: no-repeat;
    opacity: 0.08;
    pointer-events: none;
    z-index: 0;
    animation: floatOrnamento 8s ease-in-out infinite;
}

.ornamento svg {
    display: block;
    width: 100%;
    height: 100%;
}

/* posiciones */
.orn-top-left { top: -40px; left: -40px; }
.orn-top-right { top: -40px; right: -40px; }
.orn-bottom-left { bottom: -50px; left: -50px; }
.orn-bottom-right { bottom: -50px; right: -50px; }

/* flotación suave premium */
@keyframes floatOrnamento {
    0% { transform: translateY(0px) rotate(0deg); }
    50% { transform: translateY(-10px) rotate(2deg); }
    100% { transform: translateY(0px) rotate(0deg); }

}
</style>

    const texto = configTexto.texto !== undefined ? configTexto.texto : textoRespaldo;

    elemento.style.display = "block";
    elemento.style.fontFamily = FUENTES[configTexto.fuente] || configTexto.fuente || FUENTES[CONFIG.diseno.fuenteTitulo];
    elemento.style.color = configTexto.color || "#FFFFFF";
    elemento.style.fontSize = esMovil && configTexto.tamañoMovil ? configTexto.tamañoMovil : configTexto.tamaño;
    elemento.style.fontWeight = configTexto.grosor || 300;
    elemento.style.letterSpacing = valorCSS(configTexto.espaciadoLetras);
    elemento.style.lineHeight = configTexto.interlineado || "1";
    elemento.style.textTransform = configTexto.mayusculas ? "uppercase" : "none";
    elemento.style.marginTop = valorCSS(configTexto.margenArriba || 0);
    elemento.style.marginBottom = valorCSS(configTexto.margenAbajo || 0);
    elemento.style.textShadow = configTexto.sombra || "none";
    elemento.style.transform = `translate(${valorCSS(configTexto.moverDerechaIzquierda || 0)}, ${valorCSS(configTexto.moverArribaAbajo || 0)})`;

    if (permiteAmpersand) {
        elemento.innerHTML = String(texto || "").replace(/&/g, "<em>&</em>");
    } else {
        elemento.innerText = texto || "";
    }
}

function aplicarPortada() {
    const portada = CONFIG.portada || {};
    const cajaTexto = portada.cajaTexto || {};

    root.style.setProperty('--cover-content-width', cajaTexto.anchoMaximo || '900px');
    root.style.setProperty('--cover-content-x', valorCSS(cajaTexto.moverDerechaIzquierdaPC || 0));
    root.style.setProperty('--cover-content-y', valorCSS(cajaTexto.moverArribaAbajoPC || 0));
    root.style.setProperty('--cover-content-x-mobile', valorCSS(cajaTexto.moverDerechaIzquierdaMovil || 0));
    root.style.setProperty('--cover-content-y-mobile', valorCSS(cajaTexto.moverArribaAbajoMovil || 0));
    root.style.setProperty('--cover-text-align', cajaTexto.alineacion || 'center');

    const overlay = document.getElementById('cover-overlay');
    if (overlay && portada.fondo && portada.fondo.oscurecer) {
        overlay.style.background = portada.fondo.oscurecer;
    }

    aplicarEstiloTextoPortada(document.getElementById('t-eyebrow'), portada.frase, CONFIG.global.frase);
    aplicarEstiloTextoPortada(document.getElementById('t-names'), portada.nombre, CONFIG.global.nombres, true);
    aplicarEstiloTextoPortada(document.getElementById('t-cover-date'), portada.fecha, CONFIG.global.fecha);
}

const coverBg = document.getElementById('cover-bg');
const coverVideo = document.getElementById('cover-video');

if (CONFIG.global.tipoPortada === "video") {
    coverBg.style.display = "none";
    coverVideo.style.display = "block";
    coverVideo.querySelector("source").src = CONFIG.global.videoPort;

} else if (CONFIG.global.tipoPortada === "diseno") {
    coverBg.style.display = "block";
    coverVideo.style.display = "none";
    coverBg.style.backgroundImage = `url('${CONFIG.global.disenoPort}')`;

} else {
    // Foto (por defecto)
    coverBg.style.display = "block";
    coverVideo.style.display = "none";
    coverBg.style.backgroundImage = `url('${CONFIG.global.fotoPort}')`;
}
aplicarPortada();
window.addEventListener("resize", aplicarPortada);

};

function createSec(id, icon, title, body) {
    const s = document.createElement('section');
    s.id = id;
    s.innerHTML = `<div style="max-width:800px; margin:0 auto;"><div class="icon-container">${iconSet[icon]}</div><h2>${title}</h2>${body}</div>`;
    main.appendChild(s);
}

// Renderizado de secciones

    floral: `<svg viewBox="0 0 120 120" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M60 108C46 84 38 64 60 12c22 52 14 72 0 96Z"/><path d="M60 72C42 62 28 48 18 26c24 5 42 20 42 46Z"/><path d="M60 72c18-10 32-24 42-46-24 5-42 20-42 46Z"/><path d="M60 98C44 92 30 83 16 66c22-2 39 7 44 32Z"/><path d="M60 98c16-6 30-15 44-32-22-2-39 7-44 32Z"/></svg>`,

};

function crearOrnamento(config, posicion, colorBase) {
    const ornamento = document.createElement('div');
    ornamento.className = `ornamento orn-${posicion}`;
    ornamento.style.width = valorCSS(config.tamaño || 220);
    ornamento.style.height = valorCSS(config.tamaño || 220);
    ornamento.style.opacity = config.opacidad ?? 0.08;
    ornamento.style.color = config.color || colorBase || colores.boton;
    ornamento.innerHTML = ORNAMENTOS[config.tipo] || ORNAMENTOS.floral;
    return ornamento;
}

function aplicarOrnamentos() {
    const config = CONFIG.ornamentos || {};
    const secciones = config.secciones || {};
    const portada = config.portada || {};
    const colorBase = colores.boton;

    if (portada.mostrar) {
        const cover = document.getElementById('cover');
        (portada.posiciones || ["top-left", "top-right"]).forEach(posicion => {
            cover.appendChild(crearOrnamento(portada, posicion, colorBase));
        });
    }

    if (!secciones.mostrar) return;

    const excluidas = secciones.excluirSecciones || [];
    document.querySelectorAll('section').forEach(section => {
        if (excluidas.includes(section.id)) return;
        (secciones.posiciones || ["top-left", "bottom-right"]).forEach(posicion => {
            section.appendChild(crearOrnamento(secciones, posicion, colorBase));
        });
    });
}

// --- LÓGICA DE FUNCIONAMIENTO ---
function openLightbox(s) { document.getElementById('lightbox').querySelector('img').src = s; document.getElementById('lightbox').style.display = 'flex'; history.pushState({v:'lb'}, ""); }
function closeLightbox() { document.getElementById('lightbox').style.display = 'none'; }
function openGiftModal() {
    const r = CONFIG.regalos;
    document.getElementById('m-texto').innerText = r.textoModal;
    document.getElementById('m-titular').innerText = r.titular;
    document.getElementById('m-banco').innerText = r.banco;
    document.getElementById('m-cuenta').innerText = r.cuenta;
    document.getElementById('m-ci').innerText = r.ci;
    document.getElementById('gift-modal').style.display = 'flex';
    history.pushState({v:'mo'}, "");
}
function closeGiftModal() { document.getElementById('gift-modal').style.display = 'none'; }
window.onpopstate = () => { closeLightbox(); closeGiftModal(); };
function copyAcc() { navigator.clipboard.writeText(CONFIG.regalos.cuenta); const t = document.getElementById('toast'); t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 2000); }
function toggleMusic() { const m = document.getElementById('bg-music'); m.paused ? m.play() : m.pause(); }
function updateCD() {
    const t = CONFIG.global.fechaCuenta - new Date();
    if(t<0) return;
    document.getElementById('days').innerText = Math.floor(t/86400000);
    document.getElementById('hours').innerText = Math.floor((t/3600000)%24);
    document.getElementById('mins').innerText = Math.floor((t/60000)%60);
    document.getElementById('secs').innerText = Math.floor((t/1000)%60);
}
updateCD();
setInterval(updateCD, 1000);
const obs = new IntersectionObserver(es => es.forEach(e => { if(e.isIntersecting) e.target.classList.add('visible'); }), {threshold:0.1});
document.querySelectorAll('section').forEach(s => obs.observe(s));
  aplicarOrnamentos();
</script>
